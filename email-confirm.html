<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Email Confirmed - WhatsApp Extension</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background: linear-gradient(135deg, #25D366 0%, #20BA5A 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    
    .container {
      background: white;
      border-radius: 12px;
      padding: 40px;
      max-width: 500px;
      width: 100%;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
      text-align: center;
    }
    
    .success-icon {
      width: 80px;
      height: 80px;
      margin: 0 auto 20px;
      background: #25D366;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 40px;
    }
    
    h1 {
      color: #1a1a1a;
      margin-bottom: 15px;
      font-size: 28px;
    }
    
    p {
      color: #666;
      line-height: 1.6;
      margin-bottom: 20px;
    }
    
    .info {
      background: #f5f5f5;
      border-radius: 8px;
      padding: 15px;
      margin-top: 20px;
      font-size: 14px;
      color: #666;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="success-icon">✓</div>
    <h1>Email Confirmed!</h1>
    <p>Your email has been successfully verified. You can now close this window and login to the extension.</p>
    <div class="info">
      <strong>Next Steps:</strong><br>
      1. Close this window<br>
      2. Open the WhatsApp Web Extension<br>
      3. Login with your email and password
    </div>
  </div>
  
  <script>
    // Extract token from URL hash if needed
    const hash = window.location.hash;
    if (hash) {
      console.log('Email confirmation successful');
      // You can add additional logic here if needed
    }
  </script>
</body>
</html>
