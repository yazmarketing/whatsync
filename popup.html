<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WhatsApp Web Extension</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    
    body {
      width: 380px;
      max-height: 600px;
      background-color: #ffffff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      margin: 0;
      padding: 0;
      border-radius: 12px;
      overflow: hidden;
    }
    
    .container {
      padding: 20px 24px;
      background-color: #ffffff;
      width: 100%;
    }
    
    .header {
      margin-bottom: 20px;
    }
    
    .header h1 {
      font-size: 22px;
      font-weight: 600;
      color: #1a1a1a;
      margin: 0;
    }
    
    .form-group {
      margin-bottom: 16px;
      position: relative;
    }
    
    .form-group label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      color: #1a1a1a;
      margin-bottom: 6px;
    }
    
    .input-wrapper {
      position: relative;
      display: flex;
      align-items: center;
    }
    
    .form-group input {
      width: 100%;
      padding: 10px 40px 10px 12px;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      font-size: 14px;
      background-color: #ffffff;
      color: #1a1a1a;
      outline: none;
      transition: all 0.3s ease;
    }
    
    .form-group input::placeholder {
      color: #999999;
    }
    
    .form-group input:focus {
      border-color: #25D366;
      background-color: #ffffff;
    }
    
    .input-icon {
      position: absolute;
      right: 12px;
      width: 18px;
      height: 18px;
      pointer-events: none;
      opacity: 0.5;
      color: #1a1a1a;
    }
    
    .password-toggle {
      position: absolute;
      right: 12px;
      width: 18px;
      height: 18px;
      cursor: pointer;
      opacity: 0.5;
      transition: opacity 0.2s;
      color: #1a1a1a;
    }
    
    .password-toggle:hover {
      opacity: 0.8;
    }
    
    .link-text {
      text-align: center;
      margin: 16px 0;
      font-size: 13px;
      color: #1a1a1a;
    }
    
    .link-text a {
      color: #25D366;
      text-decoration: none;
      font-weight: 500;
      transition: color 0.2s;
    }
    
    .link-text a:hover {
      color: #20BA5A;
      text-decoration: underline;
    }
    
    .submit-btn {
      width: 100%;
      padding: 12px;
      background-color: #25D366;
      color: #ffffff;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: background-color 0.3s ease;
    }
    
    .submit-btn:hover {
      background-color: #20BA5A;
    }
    
    .submit-btn:active {
      transform: scale(0.98);
    }
    
    .success-message {
      display: none;
      background: linear-gradient(135deg, #25D366 0%, #20BA5A 100%);
      color: #ffffff;
      padding: 20px;
      border-radius: 8px;
      text-align: center;
      margin-bottom: 20px;
      animation: slideDown 0.3s ease-out;
    }
    
    .success-message.show {
      display: block;
    }
    
    .success-message .success-icon {
      width: 50px;
      height: 50px;
      margin: 0 auto 12px;
      background: rgba(255, 255, 255, 0.2);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
    }
    
    .success-message h2 {
      font-size: 18px;
      font-weight: 600;
      margin: 0 0 8px 0;
      color: #ffffff;
    }
    
    .success-message p {
      font-size: 14px;
      margin: 0;
      opacity: 0.95;
    }
    
    @keyframes slideDown {
      from {
        opacity: 0;
        transform: translateY(-10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    
    .logged-in-section {
      display: none;
      text-align: center;
      padding: 0;
    }
    
    .logged-in-section.show {
      display: block;
      animation: slideDown 0.3s ease-out;
    }
    
    .user-info {
      background: linear-gradient(135deg, #25D366 0%, #20BA5A 100%);
      color: #ffffff;
      padding: 24px 20px;
      border-radius: 10px;
      margin-bottom: 16px;
    }
    
    .user-avatar {
      width: 60px;
      height: 60px;
      margin: 0 auto 15px;
      background: rgba(255, 255, 255, 0.2);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      font-weight: 600;
    }
    
    .user-info h2 {
      font-size: 20px;
      font-weight: 600;
      margin: 0 0 8px 0;
      color: #ffffff;
    }
    
    .user-info p {
      font-size: 14px;
      margin: 0;
      opacity: 0.9;
    }
    
    .logout-btn {
      width: 100%;
      padding: 12px;
      background-color: #ffffff;
      color: #25D366;
      border: 2px solid #25D366;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      margin-top: 4px;
    }
    
    .logout-btn:hover {
      background-color: #f0fdf4;
      border-color: #20BA5A;
      color: #20BA5A;
    }
    
    .logout-btn:active {
      transform: scale(0.98);
    }
    
    .integration-status {
      margin-bottom: 16px;
      padding: 14px 16px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 14px;
      font-weight: 500;
      text-align: left;
    }
    
    .integration-status.connected {
      background-color: #dcfce7;
      color: #166534;
      border: 1px solid #bbf7d0;
      flex-direction: row;
      align-items: center;
    }
    
    .integration-status.connected .status-badge {
      flex: 1;
      align-items: center;
      gap: 8px;
      font-weight: 600;
      font-size: 15px;
    }
    
    .integration-status.connected .status-dot {
      width: 20px;
      height: 20px;
      background-color: #25D366;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      line-height: 1;
    }
    
    .integration-status.connected .status-dot::after {
      content: '✓';
      color: #fff;
      font-weight: bold;
    }
    
    /* HubSpot account details (shown when connected) */
    .hubspot-account-details {
      display: none;
      background: #f8faf8;
      border: 1px solid #bbf7d0;
      border-radius: 10px;
      padding: 14px 16px;
      margin-bottom: 16px;
      text-align: left;
    }
    
    .hubspot-account-details.visible {
      display: block;
    }
    
    .hubspot-account-details__title {
      font-size: 12px;
      font-weight: 700;
      color: #166534;
      text-transform: uppercase;
      letter-spacing: 0.02em;
      margin-bottom: 10px;
    }
    
    .hubspot-account-details__row {
      font-size: 13px;
      color: #374151;
      margin-bottom: 6px;
    }
    
    .hubspot-account-details__row:last-of-type {
      margin-bottom: 12px;
    }
    
    .hubspot-account-details__actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid #dcfce7;
    }
    
    .hubspot-account-details__btn {
      padding: 8px 12px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      border: 1px solid #bbf7d0;
      background: #fff;
      color: #166534;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      transition: background 0.2s, color 0.2s;
    }
    
    .hubspot-account-details__btn:hover {
      background: #dcfce7;
      color: #14532d;
    }
    
    .hubspot-account-details__btn--disconnect {
      color: #dc2626;
      border-color: #fecaca;
    }
    
    .hubspot-account-details__btn--disconnect:hover {
      background: #fef2f2;
      color: #b91c1c;
    }
    
    .integration-status.disconnected {
      background-color: #f0fdf4;
      color: #166534;
      border: 1px solid #bbf7d0;
    }
    
    .integration-status.error {
      background-color: #fef2f2;
      color: #991b1b;
      border: 1px solid #fecaca;
    }
    
    .integration-status.loading {
      background-color: #f0fdf4;
      color: #166534;
      border: 1px solid #bbf7d0;
    }
    
    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      min-width: 0;
    }
    
    .integration-status.not_connected .status-badge {
      flex: 1;
      min-width: 0;
    }
    
    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
    }
    
    .status-dot.connected {
      background-color: #25D366;
    }
    
    .status-dot.disconnected {
      background-color: #25D366;
      opacity: 0.6;
    }
    
    .status-dot.not_connected {
      background-color: #25D366;
      opacity: 0.5;
    }
    
    .status-dot.error {
      background-color: #dc2626;
    }
    
    .status-dot.loading {
      background-color: #25D366;
      opacity: 0.7;
    }
    
    .integration-status.not_connected {
      background-color: #f0fdf4;
      color: #1a1a1a;
      border: 1px solid #bbf7d0;
      flex-direction: column;
      align-items: stretch;
      gap: 12px;
    }
    
    .integration-status.not_connected .status-badge {
      flex: none;
    }
    
    .integration-status.not_connected .status-dot {
      display: none;
    }
    
    .integration-status.not_connected #statusText {
      font-size: 14px;
      font-weight: 500;
    }
    
    .integration-notice {
      font-size: 13px;
      color: #4b5563;
      line-height: 1.45;
      margin: 0;
      font-weight: 400;
    }
    
    .integration-status .integration-connect-btn {
      width: auto;
      min-width: 130px;
      flex-shrink: 0;
    }
    
    .integration-status.not_connected .integration-connect-btn {
      width: 100%;
      align-self: stretch;
    }
    
    .integration-connect-btn {
      width: 100%;
      padding: 10px 18px;
      background-color: #25D366;
      color: #ffffff;
      border: none;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background-color 0.2s ease, transform 0.2s ease;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      white-space: nowrap;
    }
    
    .integration-connect-btn:hover {
      background-color: #20BA5A;
    }
    
    .integration-connect-btn:active {
      transform: scale(0.98);
    }

    /* Initial state: show loading until login state is determined (avoids login-form flash) */
    #popupLoading {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 260px;
      font-size: 14px;
      color: #666;
      padding: 24px;
      text-align: center;
    }
    #popupLoading.hidden {
      display: none !important;
    }
    #loginSection.initial-hide {
      display: none !important;
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- Shown until we know login state; then hidden and either login or logged-in is shown -->
    <div id="popupLoading">
      <span>Checking login...</span>
    </div>
    <!-- Success Message -->
    <div class="success-message" id="successMessage">
      <div class="success-icon">✓</div>
      <h2 id="successTitle">Successfully Logged In!</h2>
      <p id="successText">Welcome back!</p>
    </div>
    
    <!-- Logged In Section -->
    <div class="logged-in-section" id="loggedInSection">
      <div class="user-info">
        <div class="user-avatar" id="userAvatar">U</div>
        <h2 id="userName">User</h2>
        <p id="userEmail">user@example.com</p>
      </div>
      
      <!-- Integration Status -->
      <div class="integration-status" id="integrationStatus" style="display: none;">
        <span class="status-badge">
          <span class="status-dot" id="statusDot"></span>
          <span id="statusText">Checking integration status...</span>
        </span>
        <p class="integration-notice" id="integrationNotice" style="display: none;"></p>
        <a href="https://whatsync.io/dashboard/integrations" target="_blank" class="integration-connect-btn" id="integrationConnectBtn" style="display: none;">
          Connect HubSpot
        </a>
      </div>
      
      <!-- HubSpot account details (when connected) -->
      <div class="hubspot-account-details" id="hubspotAccountDetails">
        <div class="hubspot-account-details__title">HubSpot Account</div>
        <div class="hubspot-account-details__row" id="hubspotPortalId">Portal ID: —</div>
        <div class="hubspot-account-details__row" id="hubspotConnectedDate">Connected: —</div>
        <div class="hubspot-account-details__actions">
          <button type="button" class="hubspot-account-details__btn" id="hubspotTestConnectionBtn">Test Connection</button>
          <a href="https://whatsync.io/dashboard/integrations" target="_blank" class="hubspot-account-details__btn" id="hubspotReconnectBtn">Reconnect</a>
          <a href="https://whatsync.io/dashboard/integrations" target="_blank" class="hubspot-account-details__btn hubspot-account-details__btn--disconnect" id="hubspotDisconnectBtn">Disconnect</a>
        </div>
      </div>
      
      <button type="button" class="logout-btn" id="logoutBtn">Log Out</button>
    </div>
    
    <!-- Login/Signup Form (hidden until we know user is not logged in) -->
    <div id="loginSection" class="initial-hide">
      <div class="header">
        <h1 id="pageTitle">Log In.</h1>
      </div>
      
      <form id="loginForm">
      <div class="form-group" id="emailLoginGroup">
        <label for="emailLogin">Email</label>
        <div class="input-wrapper">
          <input type="email" id="emailLogin" name="emailLogin" placeholder="Enter your email" required>
          <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path>
            <polyline points="22,6 12,13 2,6"></polyline>
          </svg>
        </div>
      </div>
      
      <div class="form-group signup-field" id="firstNameGroup" style="display: none;">
        <label for="firstName">First Name</label>
        <div class="input-wrapper">
          <input type="text" id="firstName" name="firstName" placeholder="Enter your first name">
          <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
            <circle cx="12" cy="7" r="4"></circle>
          </svg>
        </div>
      </div>
      
      <div class="form-group signup-field" id="lastNameGroup" style="display: none;">
        <label for="lastName">Last Name</label>
        <div class="input-wrapper">
          <input type="text" id="lastName" name="lastName" placeholder="Enter your last name">
          <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
            <circle cx="12" cy="7" r="4"></circle>
          </svg>
        </div>
      </div>
      
      <div class="form-group signup-field" id="emailGroup" style="display: none;">
        <label for="email">Email</label>
        <div class="input-wrapper">
          <input type="email" id="email" name="email" placeholder="Enter your email">
          <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path>
            <polyline points="22,6 12,13 2,6"></polyline>
          </svg>
        </div>
      </div>
      
      <div class="form-group">
        <label for="password">Password</label>
        <div class="input-wrapper">
          <input type="password" id="password" name="password" placeholder="Enter your password" required>
          <svg class="password-toggle" id="togglePassword" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
            <circle cx="12" cy="12" r="3"></circle>
          </svg>
        </div>
      </div>
      
      <div class="link-text">
        <span id="switchText">Don't have an account? </span><a href="#" id="switchLink">Sign Up</a>
      </div>
      
      <button type="submit" class="submit-btn" id="submitBtn">Log In</button>
      </form>
    </div>
  </div>
  <!-- Supabase JS Library (local) -->
  <script src="supabase.js"></script>
  <!-- Configuration -->
  <script src="config.js"></script>
  <!-- Main popup script -->
  <script src="popup.js"></script>
</body>
</html>
